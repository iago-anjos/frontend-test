<!doctype html>
<html lang="pt-br">
  <head>
    <title>Green Thumb - Find your next plant</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./index.scss" />
  </head>

  <body>
    <header class="header">
      <div class="container">
        <img
          src="images/icons/logo-white.svg"
          alt="Green Thumb Logo"
          class="logo"
        />
      </div>
    </header>

    <main id="main-content">
      <section class="hero">
        <div class="container hero-container">
          <div class="hero-content">
            <h1 class="hero-title">Find your next green friend</h1>
          </div>
          <div class="hero-images">
            <img
              src="images/hero/desktop/left-leaves.png"
              alt=""
              class="hero-img-left"
            />
            <img
              src="images/hero/desktop/plantperson.png"
              alt=""
              class="hero-img-person"
            />
            <img
              src="images/hero/desktop/right-leaves.png"
              alt=""
              class="hero-img-right"
            />
          </div>
        </div>
      </section>
    </main>
    <script src="main.js"></script>
  </body>
</html>
