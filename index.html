<!doctype html>
<html lang="pt-br">
  <head>
    <title>Green Thumb - Find your next plant</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./index.scss" />
  </head>

  <body>
    <header class="header">
      <div class="container">
        <img
          src="images/icons/logo-white.svg"
          alt="Green Thumb Logo"
          class="logo"
        />
      </div>
    </header>

    <main id="main-content">
      <section class="hero">
        <div class="container hero-container">
          <div class="hero-content">
            <h1 class="hero-title">Find your next green friend</h1>
          </div>
          <div class="hero-images">
            <img
              src="images/hero/desktop/left-leaves.png"
              alt=""
              class="hero-img-left"
            />
            <img
              src="images/hero/desktop/plantperson.png"
              alt=""
              class="hero-img-person"
            />
            <img
              src="images/hero/desktop/right-leaves.png"
              alt=""
              class="hero-img-right"
            />
          </div>
        </div>
      </section>

      <section class="filters">
        <div class="container filters-container">
          <div class="filter-group">
            <div class="filter-group-label">
              <img
                src="images/illustrations/sun.png"
                alt=""
                class="filter-group-icon"
              />
              <p>1. Set the amount of <strong>sunlight</strong></p>
            </div>
            <select id="sunlight" class="filter-group-select">
              <option value="" disabled selected>Select...</option>
              <option value="no">No sun</option>
              <option value="low">Low sun</option>
              <option value="high">High sun</option>
            </select>
          </div>
          <div class="filter-group">
            <div class="filter-group-label">
              <img
                src="images/illustrations/wateringcan.png"
                alt=""
                class="filter-group-icon"
              />
              <p>
                2. How often do you want to <strong>water</strong> your plant?
              </p>
            </div>
            <select id="water" class="filter-group-select">
              <option value="" disabled selected>Select...</option>
              <option value="rarely">Rarely</option>
              <option value="regularly">Regularly</option>
              <option value="daily">Daily</option>
            </select>
          </div>

          <div class="filter-group">
            <div class="filter-group-label">
              <img
                src="images/illustrations/dog.png"
                alt=""
                class="filter-group-icon"
              />
              <p>3. Do you have pets? Do they <strong>chew</strong> plants?</p>
            </div>
            <select id="pets" class="filter-group-select">
              <option value="" disabled selected>Select...</option>
              <option value="false">No/They don't care</option>
              <option value="true">Yes</option>
            </select>
          </div>
        </div>
      </section>
    </main>
    <script src="main.js"></script>
  </body>
</html>
